<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>To-Do App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <button type="button" class="theme-toggle">toggle theme</button>

      <h1 class="app-title">My To-Do List</h1>

      <form class="todo-form">
        <input
          type="text"
          class="todo-input"
          placeholder="What do you need to do?"
        />
        <button type="submit" class="todo-add-btn">Add</button>
      </form>

      <div class="filters">
        <button type="button" class="filter-btn" data-filter="all">All</button>
        <button type="button" class="filter-btn" data-filter="active">
          Active
        </button>
        <button type="button" class="filter-btn" data-filter="completed">
          Completed
        </button>
      </div>

      <ul class="todo-list">
        <!-- Tasks will go here -->
      </ul>

      <div class="todo-footer">
        <p class="todo-count">0 items left</p>
        <p class="todo-empty hidden">no tasks yet</p>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
